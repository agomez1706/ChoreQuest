<div class="modal-backdrop" (click)="close()">
  <div
    class="modal-card card"
    role="dialog"
    aria-modal="true"
    aria-labelledby="create-task-title"
    (click)="$event.stopPropagation()"
  >
    <div class="modal-header">
      <h3 id="create-task-title">Create New Task</h3>
      <button
        class="close-btn"
        type="button"
        aria-label="Close create task dialog"
        (click)="close()"
      >
        ✕
      </button>
    </div>

    <div class="modal-body">
      @if (errorMessage) {
        <div class="error-banner">{{ errorMessage }}</div>
      }

      <div class="form-group">
        <label for="task-title">Task Title</label>
        <mat-form-field appearance="outline" class="material-field no-floating-label">
          <input
            matInput
            id="task-title"
            type="text"
            [(ngModel)]="title"
            placeholder="e.g. Take out trash"
            maxlength="100"
            class="material-field"
          />
        </mat-form-field>
      </div>

      <div class="form-group">
        <label for="task-assignee">Assign To</label>
        <mat-form-field appearance="outline" class="material-field no-floating-label">
          <mat-select
            id="task-assignee"
            [(ngModel)]="assigned_to"
            panelClass="custom-select-panel"
            placeholder="Select a member..."
            class="material-field"
          >
            @for (member of members; track member.id) {
              <mat-option [value]="member.id">{{ member.display_name }}</mat-option>
            }
          </mat-select>
        </mat-form-field>
      </div>

      <div class="form-group">
        <label for="task-due">Due Date</label>
        <mat-form-field appearance="outline" class="material-field no-floating-label">
          <input
            matInput
            id="task-due"
            [matDatepicker]="picker"
            [(ngModel)]="due_date"
            readonly
            (click)="picker.open()"
            class="material-field"
          />
          <mat-datepicker-toggle matSuffix [for]="picker"></mat-datepicker-toggle>
          <mat-datepicker #picker></mat-datepicker>
        </mat-form-field>
      </div>

      <div class="form-group">
        <label>Difficulty</label>
        <mat-button-toggle-group
          class="difficulty-toggle-group"
          name="difficulty"
          [(ngModel)]="difficulty"
          aria-label="Task difficulty"
        >
          <mat-button-toggle class="easy-toggle" value="Easy">Easy</mat-button-toggle>
          <mat-button-toggle class="medium-toggle" value="Medium">Medium</mat-button-toggle>
          <mat-button-toggle class="hard-toggle" value="Hard">Hard</mat-button-toggle>
        </mat-button-toggle-group>
      </div>

      <div class="form-group">
        <label for="task-points">Point Value</label>
        <mat-form-field appearance="outline" class="material-field points-field no-floating-label">
          <span matPrefix class="points-prefix">⭐</span>
          <input
            matInput
            id="task-points"
            type="number"
            [(ngModel)]="points"
            min="0"
            step="1"
            placeholder="e.g. 10"
            class="material-field"
          />
          <span matSuffix class="points-suffix">pts</span>
        </mat-form-field>
      </div>
      <p class="form-hint">Points awarded to the member when they complete this task.</p>
    </div>

    <div class="modal-footer">
      <button class="btn btn--outline" (click)="close()" [disabled]="isSubmitting">Cancel</button>
      <button class="btn btn--primary" (click)="submit()" [disabled]="!isFormValid || isSubmitting">
        @if (isSubmitting) {
          Creating...
        } @else {
          Create Task
        }
      </button>
    </div>
  </div>
</div>
